name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: lint / typecheck / test / format
    runs-on: ubuntu-latest
    # The gate now builds the package dists before linting; on the 2-core
    # runner the previous 10-minute budget was never validated past the lint
    # step, so give the full build + recursive test sweep real headroom.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm skips electron's postinstall ("Ignored build scripts"), and
      # require('electron') throws without the downloaded binary — the
      # apps/tactics electron/main.test.ts suite fails at collection.
      # Mirrors the same step in e2e.yml.
      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Format check
        run: pnpm format:check

      # The @chimera-engine/* packages ship dists (F59–F62); typed ESLint and
      # every cross-package import resolve against them. The root gate scripts
      # run `pnpm build:packages` themselves, but this workflow invokes the raw
      # sub-commands, so build first or `pnpm -r lint` reports every
      # cross-package type as an unresolved "error type".
      - name: Build packages
        run: pnpm build:packages

      - name: Lint (workspace packages)
        run: pnpm -r lint

      # Mirrors the root `lint` script's non-recursive tail. The e2e suite
      # moved to apps/tactics/e2e (F63) and is covered by the recursive steps.
      - name: Lint (tools, root configs)
        run: pnpm exec eslint tools eslint.config.mjs vitest.config.mts

      - name: Typecheck
        run: pnpm typecheck

      # Every package defines `build` since F58–F62; this proves each package
      # also builds standalone (not only through the root composite build).
      - name: Verify recursive build/typecheck resolve
        run: pnpm -r --if-present build && pnpm -r --if-present typecheck

      - name: Validate assets
        run: pnpm validate:assets

      - name: Test (workspace packages)
        run: pnpm -r test

      - name: Test (tools)
        run: pnpm exec vitest run --dir tools
