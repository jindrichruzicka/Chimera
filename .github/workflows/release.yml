name: Release

# Publishes the @chimera-engine/* engine packages AND the `create-chimera-game` initializer to npm on a
# version tag (F66). The initializer is a workspace member, so `changeset publish` picks it up
# alongside the engine packages whenever its version is not yet on the registry; its `prepack`
# (and the explicit build step below) bundle its `dist/index.mjs` bin from source first.
#
# Flow: run `pnpm changeset` to declare bumps, `pnpm version-packages` to apply them and
# write per-package CHANGELOGs, commit, then push a release tag (Changesets emits per-package
# tags like `@chimera-engine/simulation@1.0.0`). That tag push triggers this workflow, which builds,
# runs the true-artifact `verify:pack` gate, and `changeset publish`es every package whose
# version is not yet on the registry.
#
# Packages publish with npm provenance: the job is granted `id-token: write` (OIDC) and the
# publish step sets `NPM_CONFIG_PROVENANCE=true`. Provenance is enabled here in CI only (not via
# each package's `publishConfig`) on purpose â€” provenance generation needs the OIDC CI runtime,
# so a global `publishConfig.provenance` would break the LOCAL `verify:publish` dry-run.
#
# CI Actions billing is blocked on this account, so this workflow does not actually execute
# here â€” the LOCAL `verify:pack` + `verify:publish` gates remain authoritative before a real
# publish. It is the future automation layer and the executable record of the release steps.
# Before the first real publish, configure the `NPM_TOKEN` repository secret (an npm automation
# token with publish rights to the `@chimera-engine` scope).

on:
  push:
    tags:
      - 'v*.*.*'
      - '@chimera-engine/*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance (OIDC) â€” links each published tarball to this build

jobs:
  publish:
    name: Build, verify:pack, and publish @chimera-engine/*
    runs-on: ubuntu-latest
    # build:packages + verify:pack packs every engine package and runs the Playwright e2e
    # against the packed artifacts (an out-of-workspace consumer install + Electron run),
    # so this needs the same Electron/Playwright/Xvfb headroom as the e2e job.
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Xvfb
        run: Xvfb :99 -screen 0 1024x768x24 &

      # Locked 1.X.Y gate (docs/versioning-policy.md): the first-party set â€”
      # every @chimera-engine/* package + create-chimera-game â€” must be on one identical
      # 1.X.Y before anything publishes. Fails fast, before build, so a drifted set can
      # never reach the registry.
      - name: Verify version alignment (verify:version-alignment)
        run: pnpm verify:version-alignment

      # The published create-chimera-game bin freezes each engine version into
      # toolchain.generated.ts (ENGINE_DEP_RANGES). If that snapshot drifts from the live
      # engine versions, scaffolded games would pin the wrong (or a nonexistent) range. Fail
      # fast here, before build/publish, so a stale snapshot can never ship.
      - name: Verify toolchain snapshot (verify:toolchain-snapshot)
        run: pnpm verify:toolchain-snapshot

      - name: Build packages
        run: pnpm build:packages

      # The initializer bin is an esbuild bundle, not part of the engine `tsc -b`. Build it
      # explicitly so its dist exists for `changeset publish` (its `prepack` also rebuilds it).
      - name: Build the create-chimera-game initializer
        run: pnpm --filter create-chimera-game build

      - name: Verify packed artifacts (verify:pack)
        run: pnpm verify:pack
        env:
          CI: true
          DISPLAY: ':99'

      # Publish-readiness gate: depcheck + publint + `pnpm publish --dry-run` per package â€”
      # the same publish path `changeset publish` takes, proving every package publishes
      # cleanly before the real publish runs. No Electron/Playwright (no e2e).
      - name: Verify publish-readiness (verify:publish)
        run: pnpm verify:publish

      - name: Publish to npm
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # provenance attestation (requires the job's id-token: write); changeset publish
          # shells out to pnpm publish, which inherits this env and honors it.
          NPM_CONFIG_PROVENANCE: true
