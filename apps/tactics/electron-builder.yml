# apps/tactics — Electron app packaging config (M9 / F67, issue #813).
#
# The repo's FIRST distributable-app build config. F64/F66 delivered npm-package
# publishing only; this produces a MINIMAL, UNSIGNED local app bundle on the host
# platform, carrying the Chimera icon generated by F67 T3 (#811).
#
# OUT OF SCOPE (explicit, per the issue's acceptance criteria): code signing,
# notarisation, and any CI release matrix. The bundle is unsigned (mac `identity: null`).
#
# Tokenisation seam for #814 (the create-chimera-game blank-template mirror): a scaffolded
# game swaps only the marked identity fields (`appId`, `productName`) and the per-platform
# `icon` paths — everything else (file layout, targets) mirrors unchanged.
#
# This config lives in the consumer app, never in @chimera-engine/electron, which stays
# game-agnostic (Invariants #94/#106/#107). It must not embed the debug-mode env flag
# (Invariant #27 — the invariants gate scans this file for it).

appId: com.chimera.tactics # tokenise (#814)
productName: Tactics # tokenise (#814)

directories:
  # Installers/bundles go to release/ — NOT dist/, which holds the esbuild-bundled
  # main/preload JS (and is gitignored separately); writing here would clobber it.
  output: release

# Plain directory layout (no asar) for this first minimal cut: the host reads game
# content via a directory loader (readdir) and serves the renderer through a custom
# protocol — both do ordinary filesystem reads, so an unpacked app "just works" exactly
# as in dev. (asar:true is a later optimisation that would need asarUnpack of the data dir.)
asar: false

# The app has NO native node modules: dist/electron/main.js and dist/preload/api.js are
# fully esbuild-bundled (only `electron` + node builtins stay external). Skip
# @electron/rebuild — it has nothing to rebuild and would otherwise walk the pnpm virtual
# store and fail.
# NOTE (size, follow-up): electron-builder still ships this app's production `dependencies`
# (the @chimera-engine/* workspace packages, ~500MB once symlinks are dereferenced) even
# though main.js already bundles them — a `files: !node_modules/**` rule does NOT exclude
# production deps. Trimming them needs reclassifying those deps (a layer-model change),
# tracked separately; the bundle is correct and runnable as-is.
npmRebuild: false

# Packaged file layout is dictated by the host's resolveRuntimePaths
# (electron/main/index.ts), which walks UP from the main bundle's __dirname:
#   preload   = __dirname/../preload/api.js
#   renderer  = __dirname/../../renderer/out/index.html
#   content   = __dirname/../../apps/<gameId>/data   (gameAssetsRoot = ../../apps)
#   assets    = __dirname/../../apps/<gameId>/assets
# So data/ and assets/ are remapped INTO an apps/tactics/ subtree. `files` (not
# extraResources) is required — extraResources lands one level above the app root,
# unreachable by the ../../ walk.
files:
  - dist/electron/main.js
  - dist/preload/api.js
  - from: renderer/out
    to: renderer/out
  - from: data
    to: apps/tactics/data
  - from: assets
    to: apps/tactics/assets
  # Default RUNTIME window icon: the bundled host's createMainWindow (resolveAppIcon,
  # @chimera-engine/electron) loads the default Chimera PNG from
  # <app>/assets/icons/chimera.png (moduleDirname/../../assets/icons/chimera.png — the
  # esbuild bundle sits at <app>/dist/electron/). Ship the engine's icon set there or
  # window creation logs an unhandled rejection. `from` is a DIRECTORY (a file set, like
  # renderer/out above); no byte duplication — sourced from the installed
  # @chimera-engine/electron package (#814's scaffold mirror points this at its own copy).
  - from: node_modules/@chimera-engine/electron/assets/icons
    to: assets/icons

mac:
  icon: node_modules/@chimera-engine/electron/assets/icons/chimera.icns # tokenise (#814)
  category: public.app-category.games
  identity: null # unsigned — code signing is OUT OF SCOPE
  target:
    - dir
    - dmg

win:
  icon: node_modules/@chimera-engine/electron/assets/icons/chimera.ico # tokenise (#814)
  target:
    - nsis

linux:
  icon: node_modules/@chimera-engine/electron/assets/icons/chimera.png # tokenise (#814)
  category: Game
  target:
    - dir
    - AppImage
